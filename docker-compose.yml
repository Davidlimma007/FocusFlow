version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: focusflow-focusflow
    restart: always

    environment:
      POSTGRES_DB: focusflow_db
      POSTGRES_USER: focusflow
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - focusflow-network

volumes:
  postgres_data:

networks:
  focusflow-network: